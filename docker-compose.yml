# Stack for gopher-cta: a fetcher (CTA -> static gopher tree) + geomyidae daemon.
#
#   docker compose pull && docker compose up -d   # run the CI-published image
#   docker compose up -d --build                  # local build instead (dev)
#   docker compose logs -f fetcher                # watch publishes / narration
#   docker compose down                           # stop & remove
#
# PRODUCTION (auto-deploy): add the `deploy` profile to also run Watchtower, which
# pulls a fresh ghcr :latest and recreates the fetcher whenever CI publishes:
#
#   docker compose --profile deploy up -d         # fetcher + geomyidae + watchtower
#
# The fetcher image is published by CI (GitHub Actions -> GHCR, multi-arch
# amd64+arm64), so `pull` gets a native image. `build:` stays as a dev fallback
# (`--build` rebuilds from source). The fetcher writes the gopher tree into
# ./public every 30s (live trains + AI narration); geomyidae serves
# ./public/current. `restart: unless-stopped` brings both back after a reboot.
# geomyidae's -h (from .env GOPHER_HOST) makes menu links advertise the reachable
# host instead of the container id — without it, link-following breaks.
services:
  fetcher:
    image: ghcr.io/felipedbene/gopher-cta:latest
    build: .                              # dev fallback: `compose up -d --build`
    pull_policy: always                   # `compose up` re-pulls :latest from GHCR
    container_name: gopher-cta-fetcher
    env_file: .env                       # CTA_TRAIN_API_KEY (+ optional CTA_AI_BASE / CTA_HOME_*)
    command: ["--interval", "30", "--out", "/srv"]
    volumes:
      - ./public:/srv
    restart: unless-stopped
    labels:
      # Watchtower (production `deploy` profile) auto-updates ONLY this container
      # when CI publishes a fresh ghcr :latest. geomyidae is a local build with no
      # registry image, so it is deliberately left unwatched.
      - com.centurylinklabs.watchtower.enable=true

  geomyidae:
    build:
      context: ./deploy
      dockerfile: Dockerfile.geomyidae
    image: geomyidae:local
    container_name: geo
    # Advertised host AND port for the .gph `server`/`port` tokens. Driving `-o`
    # from $GOPHER_PORT makes this base file self-sufficient for production, so the
    # gitignored override (which used to set this) can be retired entirely.
    command: ["-h", "${GOPHER_HOST:-10.0.10.69}", "-o", "${GOPHER_PORT:-7070}"]
    ports:
      - "${GOPHER_PORT:-7070}:7070"
    volumes:
      - ./public:/srv:ro
    depends_on:
      - fetcher
    restart: unless-stopped

  # Auto-deploy (PRODUCTION ONLY). Polls GHCR and recreates the fetcher in place
  # whenever CI publishes a new :latest — no SSH, no secrets, no manual pull.
  # Scoped to the `deploy` profile so a plain `docker compose up` (local dev) never
  # starts it: locally it would clobber a `--build --pull never` preview with the
  # published image. Start it in prod with:  docker compose --profile deploy up -d
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    profiles: ["deploy"]
    command: --label-enable --cleanup --include-restarting --interval 300
    environment:
      - WATCHTOWER_NO_STARTUP_MESSAGE=true
      # The host daemon rejects the client's default API version (1.25); pin one it
      # accepts. 1.41 (Docker 20.10) is within both the bundled client's range and
      # any modern daemon's, so negotiation can't strand on a too-old version.
      - DOCKER_API_VERSION=1.41
    volumes:
      # Only the daemon socket. (No ~/.docker/config.json mount: the GHCR package
      # is public so no pull auth is needed, and mounting a non-existent file makes
      # Docker create a *directory* there, which Watchtower then fails to parse.)
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
